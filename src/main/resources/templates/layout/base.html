<!DOCTYPE html>
<html th:fragment="layout(content)" xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>NoteNest</title>
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"/>
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
    <style>
        body { background-color: #f8f9fa; }

        /* ── Navbar ── */
        .navbar-brand { font-weight: 700; font-size: 1.4rem; letter-spacing: -0.5px; }
        .navbar-brand span { color: #ffd700; }

        /* ── Sidebar ── */
        .sidebar {
            position: sticky;
            top: 56px;
            height: calc(100vh - 56px);
            overflow-y: auto;
            background: #fff;
            border-right: 1px solid #e9ecef;
            padding: 1.25rem 1rem;
        }
        .sidebar .section-label {
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: .08em;
            color: #6c757d;
            margin-bottom: .5rem;
        }
        .sidebar .nav-link {
            color: #495057;
            padding: .3rem .6rem;
            border-radius: .375rem;
            font-size: .9rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .sidebar .nav-link:hover,
        .sidebar .nav-link.active { background: #f0f4ff; color: #0d6efd; }
        .sidebar .pinned-title {
            font-size: .82rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 160px;
        }

        /* ── Cards ── */
        .note-card { transition: box-shadow .15s; cursor: pointer; }
        .note-card:hover { box-shadow: 0 4px 16px rgba(0,0,0,.1); }
        .note-card .card-title { font-size: 1rem; font-weight: 600; }
        .note-card .preview-text {
            font-size: .85rem;
            color: #6c757d;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        .pin-btn { border: none; background: transparent; padding: 0; line-height: 1; }
        .pin-btn .bi-pin-fill  { color: #ffc107; }
        .pin-btn .bi-pin       { color: #adb5bd; }
        .pin-btn:hover .bi-pin { color: #ffc107; }

        /* ── Ask AI FAB ── */
        .fab-ai {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            z-index: 1050;
            border-radius: 2rem;
            padding: .65rem 1.4rem;
            font-weight: 600;
            box-shadow: 0 4px 14px rgba(13,110,253,.35);
        }

        /* ── Main content ── */
        .main-content { padding: 1.5rem; min-height: calc(100vh - 56px); }

        /* ── Flash messages ── */
        .flash-container { position: sticky; top: 56px; z-index: 100; }

        /* ── Live-search dropdown ── */
        #searchDropdown { font-size: .875rem; }
        .search-result-item:hover { background: #f0f4ff; }
        .search-view-all { background: #f8f9fa; border-radius: 0 0 .375rem .375rem; }
        .search-view-all:hover { background: #e8eeff; }
    </style>
</head>
<body>

<!-- ══ Navbar ══════════════════════════════════════════════════════════════ -->
<nav class="navbar navbar-expand-md navbar-dark bg-dark sticky-top">
    <div class="container-fluid px-3">

        <a class="navbar-brand" th:href="@{/notes}">
            Note<span>Nest</span>
        </a>

        <!-- Search bar -->
        <form class="d-flex mx-auto" style="width:46%; position:relative;"
              th:action="@{/notes/search}" method="get" role="search">
            <div class="input-group w-100">
                <input class="form-control form-control-sm bg-secondary border-0 text-white"
                       type="search" name="q" id="navSearchInput"
                       placeholder="Search notes…"
                       th:value="${keyword}" autocomplete="off"/>
                <button class="btn btn-sm btn-outline-light" type="submit">
                    <i class="bi bi-search"></i>
                </button>
            </div>
            <!-- Live-search result dropdown (populated by dashboard.js) -->
            <div id="searchDropdown"
                 style="display:none; position:absolute; top:calc(100% + 4px); left:0; right:0;
                        z-index:1100; background:#fff; border:1px solid #dee2e6;
                        border-radius:.375rem; box-shadow:0 4px 16px rgba(0,0,0,.15);
                        max-height:380px; overflow-y:auto;">
            </div>
        </form>

        <!-- New Note -->
        <a th:href="@{/notes/new}" class="btn btn-warning btn-sm fw-semibold ms-3">
            <i class="bi bi-plus-lg me-1"></i>New Note
        </a>
    </div>
</nav>

<!-- ══ Body: sidebar + main ════════════════════════════════════════════════ -->
<div class="container-fluid p-0">
    <div class="row g-0">

        <!-- ── Sidebar ────────────────────────────────────────────────────── -->
        <nav class="col-md-3 col-lg-2 sidebar d-none d-md-block">

            <!-- All Notes link -->
            <a th:href="@{/notes}"
               class="nav-link mb-3 fw-semibold"
               th:classappend="${currentFolder == null and keyword == null} ? 'active' : ''">
                <span><i class="bi bi-journal-text me-2"></i>All Notes</span>
                <span class="badge bg-secondary rounded-pill"
                      th:text="${#lists.size(sidebarFolders)}">0</span>
            </a>

            <!-- Folders -->
            <div class="section-label mt-2">Folders</div>
            <ul class="nav flex-column mb-3">
                <li class="nav-item" th:each="folder : ${sidebarFolders}">
                    <a class="nav-link"
                       th:href="@{/notes/folder/{f}(f=${folder})}"
                       th:classappend="${currentFolder == folder} ? 'active' : ''">
                        <span>
                            <i class="bi bi-folder me-2"></i>
                            <span th:text="${folder}">Folder</span>
                        </span>
                        <span class="badge bg-light text-secondary rounded-pill"
                              th:text="${folderCounts[folder] ?: 0}">0</span>
                    </a>
                </li>
            </ul>

            <!-- Tags -->
            <div class="section-label mt-2">Tags</div>
            <div class="mb-3 d-flex flex-wrap gap-1">
                <a th:each="tag : ${sidebarTags}"
                   th:href="@{/notes/search(q=${tag})}"
                   class="badge rounded-pill text-decoration-none"
                   style="background:#e8eeff; color:#3b5bdb; font-size:.75rem;"
                   th:text="${tag}">tag</a>
                <span th:if="${#lists.isEmpty(sidebarTags)}"
                      class="text-muted small">No tags yet</span>
            </div>

            <!-- Pinned -->
            <div class="section-label mt-2">Pinned</div>
            <ul class="nav flex-column">
                <li class="nav-item" th:each="pinned : ${sidebarPinned}">
                    <a class="nav-link py-1"
                       th:href="@{/notes/{id}(id=${pinned.id})}">
                        <i class="bi bi-pin-fill text-warning me-1" style="font-size:.8rem;"></i>
                        <span class="pinned-title" th:text="${pinned.title}">Note</span>
                    </a>
                </li>
                <li th:if="${#lists.isEmpty(sidebarPinned)}">
                    <span class="text-muted small ps-2">No pinned notes</span>
                </li>
            </ul>
        </nav>

        <!-- ── Main content ───────────────────────────────────────────────── -->
        <main class="col-md-9 col-lg-10 main-content">

            <!-- Flash messages -->
            <div class="flash-container" th:if="${successMessage}">
                <div class="alert alert-success alert-dismissible fade show mb-3" role="alert">
                    <i class="bi bi-check-circle me-2"></i>
                    <span th:text="${successMessage}"></span>
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>
            </div>

            <!-- Page content injected here -->
            <th:block th:replace="${content}"/>
        </main>

    </div>
</div>

<!-- ══ Ask AI floating button ══════════════════════════════════════════════ -->
<a th:href="@{/ai/chat}" class="btn btn-primary fab-ai">
    <i class="bi bi-stars me-1"></i>Ask AI
</a>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="/js/notes.js" defer></script>
<script src="/js/dashboard.js" defer></script>
</body>
</html>
