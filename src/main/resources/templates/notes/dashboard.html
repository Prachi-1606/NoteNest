<!DOCTYPE html>
<html th:replace="~{layout/base :: layout(~{::main})}"
      xmlns:th="http://www.thymeleaf.org" lang="en">
<head><title>NoteNest – Dashboard</title></head>
<body>
<main>

    <!-- ── AI Summary (flash from /ai/summarize) ───────────────────────── -->
    <div th:if="${aiSummary}" class="card border-0 shadow-sm mb-4"
         style="border-left: 4px solid #0d6efd !important;">
        <div class="card-body">
            <div class="d-flex align-items-center justify-content-between mb-2">
                <h6 class="mb-0 fw-bold text-primary">
                    <i class="bi bi-stars me-2"></i>AI Summary
                    <span class="text-muted fw-normal" th:if="${summaryFolder}"
                          th:text="'— ' + ${summaryFolder}"></span>
                </h6>
                <button type="button" class="btn-close btn-sm"
                        onclick="this.closest('.card').remove()"></button>
            </div>
            <p class="mb-0 text-muted" style="white-space: pre-wrap; font-size: .92rem;"
               th:text="${aiSummary}">Summary</p>
        </div>
    </div>

    <!-- ── Activity heatmap (only on All Notes view) ────────────────────── -->
    <div th:if="${currentFolder == null and activityDataJson != null}"
         class="card mb-4">
        <div class="card-body p-4">
            <div class="d-flex align-items-center justify-content-between mb-3 flex-wrap gap-2">
                <div>
                    <div class="text-meta" style="font-size:.7rem; text-transform:uppercase; letter-spacing:.1em; font-weight:600;">
                        Activity
                    </div>
                    <div class="mt-1" style="font-size:.9rem;">
                        <strong th:text="${notesLast30Days}">0</strong>
                        <span class="text-meta">note<span th:if="${notesLast30Days != 1}">s</span> in the last 30 days</span>
                        <span class="text-meta mx-2">·</span>
                        <strong th:text="${currentStreak}">0</strong>
                        <span class="text-meta">day<span th:if="${currentStreak != 1}">s</span> streak</span>
                        <i class="bi bi-fire ms-1" style="color:#f59e0b;" th:if="${currentStreak >= 3}"></i>
                    </div>
                </div>
            </div>
            <div style="position: relative; height: 140px;">
                <canvas id="activityChart"></canvas>
            </div>
        </div>
    </div>

    <!-- ── Page header ──────────────────────────────────────────────────── -->
    <div class="d-flex align-items-center justify-content-between mb-4 flex-wrap gap-3">
        <div>
            <h4 class="mb-1 fw-bold" th:if="${currentFolder == null}">All Notes</h4>
            <h4 class="mb-1 fw-bold d-flex align-items-center gap-2" th:if="${currentFolder != null}">
                <i class="bi bi-folder text-meta" style="font-weight:normal;"></i>
                <span th:text="${currentFolder}">Folder</span>
            </h4>
            <small class="text-meta"
                   th:text="${#lists.size(notes)} + ' note' + (${#lists.size(notes)} != 1 ? 's' : '')">
                0 notes
            </small>
        </div>
        <div class="d-flex gap-2 align-items-center">
            <!-- Sort dropdown — only shown when there are notes -->
            <select id="sortSelect" class="form-select form-select-sm"
                    style="width:auto; font-size:.82rem;"
                    th:if="${not #lists.isEmpty(notes)}">
                <option value="updated">Last updated</option>
                <option value="title">Title A–Z</option>
            </select>
            <!-- Summarize folder button — only when viewing a specific folder -->
            <form th:if="${currentFolder != null}"
                  th:action="@{/ai/summarize/{f}(f=${currentFolder})}"
                  method="post">
                <button type="submit" class="btn btn-outline-primary btn-sm">
                    <i class="bi bi-stars me-1"></i>Summarize
                </button>
            </form>
            <a th:href="@{/notes/new}" class="btn btn-primary btn-sm">
                <i class="bi bi-plus-lg me-1"></i>New Note
            </a>
        </div>
    </div>

    <!-- ── Client-side filter bar ─────────────────────────────────────────── -->
    <div id="filterBar" class="mb-4 d-flex align-items-center flex-wrap gap-2"
         th:if="${not #lists.isEmpty(notes)}">
        <span class="text-meta me-1" style="font-size:.75rem; text-transform:uppercase; letter-spacing:.08em; font-weight:600;">
            Filter
        </span>
        <button class="btn btn-sm btn-primary filter-btn" data-filter="all">
            All
        </button>
        <button class="btn btn-sm btn-outline-secondary filter-btn" data-filter="pinned">
            <i class="bi bi-pin-fill me-1" style="color:#f59e0b;"></i>Pinned
        </button>
        <!-- Per-folder buttons are injected here by dashboard.js -->
    </div>

    <style>
        .filter-btn {
            padding: .3rem .8rem;
            font-size: .8rem;
            font-weight: 500;
            color: var(--color-text-muted);
            background: var(--color-surface);
            border: 1px solid var(--color-border);
            border-radius: 999px;
            transition: all .12s;
        }
        .filter-btn:hover {
            background: var(--color-surface-alt);
            color: var(--color-text);
        }
        .filter-btn-active,
        .filter-btn.btn-primary {
            background: var(--color-text) !important;
            color: #fff !important;
            border-color: var(--color-text) !important;
        }
    </style>

    <!-- ── Unified note grid (all notes, data-* attrs for JS) ─────────────── -->
    <div id="noteGrid" class="row g-3" th:if="${not #lists.isEmpty(notes)}">
        <div class="col-sm-6 col-lg-4 note-col"
             th:each="note : ${notes}"
             th:data-folder="${note.folder}"
             th:data-pinned="${note.pinned}"
             th:data-title="${note.title}"
             th:data-updated="${note.updatedAt}">
            <div th:replace="~{fragments/note-card :: noteCard(${note})}"></div>
        </div>
    </div>

    <!-- ── Shown by JS when active filter matches nothing ─────────────────── -->
    <div id="filterEmpty" class="text-center py-5 d-none">
        <i class="bi bi-funnel display-3 text-muted opacity-50 mb-3"></i>
        <p class="text-muted mb-0">No notes match this filter.</p>
    </div>

    <!-- ── Empty state (no notes at all) ──────────────────────────────────── -->
    <div th:if="${#lists.isEmpty(notes)}"
         class="d-flex flex-column align-items-center justify-content-center py-5 text-center">
        <i class="bi bi-journal-plus display-1 text-muted opacity-50 mb-3"></i>
        <h5 class="text-muted">No notes yet</h5>
        <p class="text-muted small mb-3"
           th:text="${currentFolder != null} ? 'No notes in folder \'' + ${currentFolder} + '\'' : 'Create your first note to get started.'">
        </p>
        <a th:href="@{/notes/new}" class="btn btn-primary">
            <i class="bi bi-plus-lg me-1"></i>Create Note
        </a>
    </div>

    <!-- ── Activity heatmap renderer (only loads Chart.js on All Notes view) ── -->
    <th:block th:if="${currentFolder == null and activityDataJson != null}">
        <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0"></script>
        <script th:inline="javascript">
            (function () {
                const dataJson = /*[[${activityDataJson}]]*/ '{}';
                const activityData = JSON.parse(dataJson);
                const canvas = document.getElementById('activityChart');
                if (!canvas || typeof Chart === 'undefined') return;

                // Build the last 30 days (oldest → newest)
                const isoDays = [];
                const labels = [];
                const today = new Date();
                for (let i = 29; i >= 0; i--) {
                    const d = new Date(today);
                    d.setDate(d.getDate() - i);
                    const iso = d.getFullYear() + '-'
                              + String(d.getMonth() + 1).padStart(2, '0') + '-'
                              + String(d.getDate()).padStart(2, '0');
                    isoDays.push(iso);
                    labels.push(d.toLocaleDateString(undefined, { month: 'short', day: 'numeric' }));
                }

                const counts = isoDays.map(d => activityData[d] || 0);
                const colors = counts.map(c => {
                    if (c === 0) return '#f1f5f9';   // slate-100
                    if (c <= 2) return '#c7d2fe';    // indigo-200
                    return '#4f46e5';                // indigo-600
                });

                new Chart(canvas, {
                    type: 'bar',
                    data: {
                        labels: labels,
                        datasets: [{
                            data: counts,
                            backgroundColor: colors,
                            borderRadius: 3,
                            borderSkipped: false
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        plugins: {
                            legend: { display: false },
                            tooltip: {
                                displayColors: false,
                                callbacks: {
                                    label: ctx => ctx.parsed.y + ' note' + (ctx.parsed.y !== 1 ? 's' : '')
                                }
                            }
                        },
                        scales: {
                            y: {
                                beginAtZero: true,
                                ticks: { stepSize: 1, precision: 0, font: { size: 11 } },
                                grid:  { color: '#f1f3f5' }
                            },
                            x: {
                                grid:  { display: false },
                                ticks: { font: { size: 10 }, maxRotation: 0, autoSkip: true, maxTicksLimit: 10 }
                            }
                        }
                    }
                });
            })();
        </script>
    </th:block>

</main>
</body>
</html>
