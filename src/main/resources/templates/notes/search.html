<!DOCTYPE html>
<html th:replace="~{layout/base :: layout(~{::main})}"
      xmlns:th="http://www.thymeleaf.org" lang="en">
<head><title>NoteNest – Search</title></head>
<body>
<main>

    <!-- ── Search header ────────────────────────────────────────────────── -->
    <div class="d-flex align-items-center justify-content-between mb-4">
        <div>
            <h4 class="mb-0 fw-bold">
                <i class="bi bi-search me-2 text-primary"></i>Search Results
            </h4>
            <small class="text-muted" th:if="${not #strings.isEmpty(keyword)}">
                <span th:text="${#lists.size(results)}">0</span>
                result<span th:if="${#lists.size(results)} != 1">s</span>
                for &ldquo;<strong th:text="${keyword}">keyword</strong>&rdquo;
            </small>
            <small class="text-muted" th:if="${#strings.isEmpty(keyword)}">
                Enter a keyword in the search bar above.
            </small>
        </div>
        <a th:href="@{/notes}" class="btn btn-outline-secondary btn-sm">
            <i class="bi bi-arrow-left me-1"></i>Back to Notes
        </a>
    </div>

    <!-- ── Inline search form ───────────────────────────────────────────── -->
    <form th:action="@{/notes/search}" method="get" class="mb-4">
        <div class="input-group">
            <input type="search"
                   name="q"
                   class="form-control"
                   th:value="${keyword}"
                   placeholder="Search by title or content…"
                   autofocus/>
            <button class="btn btn-primary" type="submit">
                <i class="bi bi-search me-1"></i>Search
            </button>
        </div>
    </form>

    <!-- ── Results list ─────────────────────────────────────────────────── -->
    <div th:if="${not #lists.isEmpty(results)}">
        <div class="list-group shadow-sm">
            <a th:each="result : ${results}"
               th:href="@{/notes/{id}(id=${result.id})}"
               class="list-group-item list-group-item-action py-3 px-4">

                <div class="d-flex align-items-start justify-content-between gap-3">
                    <div class="flex-grow-1 min-width-0">

                        <!-- Title -->
                        <h6 class="mb-1 fw-semibold text-dark" th:text="${result.title}">Title</h6>

                        <!-- Highlighted preview -->
                        <p class="mb-2 text-muted small"
                           style="line-height:1.55;"
                           th:utext="${highlightedPreviews[result.id] ?: result.preview}">
                            Preview…
                        </p>

                        <!-- Tags -->
                        <div class="d-flex flex-wrap gap-1"
                             th:if="${not #lists.isEmpty(result.matchedTags)}">
                            <span th:each="tag : ${result.matchedTags}"
                                  class="badge rounded-pill"
                                  style="background:#eef2ff; color:#4361ee; font-size:.72rem;"
                                  th:text="${'#' + tag}">tag</span>
                        </div>
                    </div>

                    <!-- Folder + date column -->
                    <div class="text-end flex-shrink-0" style="min-width:100px;">
                        <span class="badge d-block mb-1"
                              style="background:#e8f4e8; color:#2d6a4f;"
                              th:text="${result.folder}">Folder</span>
                        <small class="text-muted"
                               th:text="${#temporals.format(result.updatedAt, 'MMM dd, yyyy')}">
                            date
                        </small>
                    </div>
                </div>
            </a>
        </div>
    </div>

    <!-- ── No results ───────────────────────────────────────────────────── -->
    <div th:if="${#lists.isEmpty(results) and not #strings.isEmpty(keyword)}"
         class="d-flex flex-column align-items-center py-5 text-center">
        <i class="bi bi-search display-1 text-muted opacity-50 mb-3"></i>
        <h5 class="text-muted">No notes found</h5>
        <p class="text-muted small mb-3">
            No notes match &ldquo;<strong th:text="${keyword}">keyword</strong>&rdquo;.
            Try a different keyword or browse by folder.
        </p>
        <a th:href="@{/notes}" class="btn btn-outline-primary btn-sm">
            <i class="bi bi-journal-text me-1"></i>Browse all notes
        </a>
    </div>

</main>
</body>
</html>
