<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>NoteNest – Something Went Wrong</title>
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"/>
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
    <style>
        body {
            background: linear-gradient(135deg, #fff5f5 0%, #ffe9e9 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .error-card {
            max-width: 540px;
            border: none;
            border-radius: 1rem;
            box-shadow: 0 10px 40px rgba(0,0,0,.08);
        }
        .error-code {
            font-size: 6rem;
            font-weight: 800;
            background: linear-gradient(135deg, #ff6b6b, #c92a2a);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            line-height: 1;
            letter-spacing: -3px;
        }
        .error-icon { font-size: 3rem; color: #ff6b6b; }
        .error-detail {
            background: #f8f9fa;
            border-radius: .5rem;
            padding: .75rem 1rem;
            font-family: monospace;
            font-size: .82rem;
            color: #6c757d;
            text-align: left;
            word-break: break-word;
        }
    </style>
</head>
<body>

<div class="card error-card">
    <div class="card-body text-center p-5">
        <i class="bi bi-exclamation-triangle-fill error-icon mb-3"></i>
        <div class="error-code mb-2">500</div>
        <h4 class="fw-bold mb-2">Something Went Wrong</h4>
        <p class="text-muted mb-3">
            We hit an unexpected error processing your request. The team has been notified.
        </p>

        <div class="error-detail mb-4" th:if="${errorMessage}">
            <i class="bi bi-info-circle me-1"></i>
            <span th:text="${errorMessage}">Error details</span>
        </div>

        <div class="d-flex gap-2 justify-content-center">
            <a th:href="@{/notes}" class="btn btn-primary px-4">
                <i class="bi bi-house me-1"></i>Back to Notes
            </a>
            <a href="javascript:history.back()" class="btn btn-outline-secondary px-4">
                <i class="bi bi-arrow-left me-1"></i>Go Back
            </a>
        </div>
    </div>
</div>

</body>
</html>
