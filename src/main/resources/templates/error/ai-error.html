<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>NoteNest – AI Unavailable</title>
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"/>
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
    <style>
        body {
            background: linear-gradient(135deg, #f3f0ff 0%, #e0e7ff 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .error-card {
            max-width: 560px;
            border: none;
            border-radius: 1rem;
            box-shadow: 0 10px 40px rgba(0,0,0,.08);
        }
        .error-icon {
            font-size: 3.5rem;
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .error-detail {
            background: #f8f9fa;
            border-radius: .5rem;
            padding: .75rem 1rem;
            font-size: .82rem;
            color: #6c757d;
            text-align: left;
            word-break: break-word;
        }
    </style>
</head>
<body>

<div class="card error-card">
    <div class="card-body text-center p-5">
        <i class="bi bi-stars error-icon mb-3"></i>
        <h4 class="fw-bold mb-2">AI is taking a short break</h4>
        <p class="text-muted mb-3">
            We couldn't reach the Gemini service right now. Your notes are safe —
            this only affects AI-powered features like summaries and Q&amp;A.
        </p>

        <div class="error-detail mb-4" th:if="${errorMessage}">
            <i class="bi bi-info-circle me-1"></i>
            <span th:text="${errorMessage}">Error details</span>
        </div>

        <div class="d-flex gap-2 justify-content-center flex-wrap">
            <a th:href="@{/notes}" class="btn btn-primary px-4">
                <i class="bi bi-house me-1"></i>Back to Notes
            </a>
            <a href="javascript:history.back()" class="btn btn-outline-secondary px-4">
                <i class="bi bi-arrow-left me-1"></i>Go Back
            </a>
        </div>
    </div>
</div>

</body>
</html>
