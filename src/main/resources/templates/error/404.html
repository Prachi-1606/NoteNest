<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>NoteNest – Page Not Found</title>
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"/>
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
    <style>
        body {
            background: linear-gradient(135deg, #f8f9fa 0%, #eef2ff 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .error-card {
            max-width: 540px;
            border: none;
            border-radius: 1rem;
            box-shadow: 0 10px 40px rgba(0,0,0,.08);
        }
        .error-code {
            font-size: 6rem;
            font-weight: 800;
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            line-height: 1;
            letter-spacing: -3px;
        }
        .error-icon { font-size: 3rem; color: #adb5bd; }
    </style>
</head>
<body>

<div class="card error-card">
    <div class="card-body text-center p-5">
        <i class="bi bi-search error-icon mb-3"></i>
        <div class="error-code mb-2">404</div>
        <h4 class="fw-bold mb-2">Note Not Found</h4>
        <p class="text-muted mb-3">
            We couldn't find what you're looking for. It may have been deleted or moved.
        </p>
        <p class="text-muted small mb-4" th:if="${errorMessage}" th:text="${errorMessage}">
            Error details
        </p>
        <div class="d-flex gap-2 justify-content-center">
            <a th:href="@{/notes}" class="btn btn-primary px-4">
                <i class="bi bi-house me-1"></i>Back to Notes
            </a>
            <a th:href="@{/notes/new}" class="btn btn-outline-secondary px-4">
                <i class="bi bi-plus-lg me-1"></i>New Note
            </a>
        </div>
    </div>
</div>

</body>
</html>
