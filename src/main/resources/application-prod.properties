# ── Production profile (Postgres on Render free tier) ──────────────────────
# Activate with: SPRING_PROFILES_ACTIVE=prod
# Required environment variables: DB_URL, DB_USERNAME, DB_PASSWORD, GEMINI_API_KEY
# Render injects PORT automatically.

# Application
spring.application.name=NoteNest

# Postgres Datasource — values pulled from environment at runtime
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# Connection pool — keep small for free tier
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=1

# JPA / Hibernate
# 'update' lets Hibernate create/migrate the schema on startup — fine for a
# personal app. Switch to 'validate' once your schema is stable.
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# Disable H2 console in production
spring.h2.console.enabled=false

# Server — Render sets PORT for us
server.port=${PORT:8080}
server.error.include-stacktrace=never
server.error.include-message=never

# Logging — quieter in production
logging.level.root=INFO
logging.level.com.notenest=INFO
logging.level.org.hibernate.SQL=WARN

# Gemini AI — API key from environment
gemini.api.key=${GEMINI_API_KEY}
gemini.api.url=https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent
