# Application
spring.application.name=NoteNest
spring.profiles.active=dev

# H2 File-Based Database (persists across restarts)
spring.datasource.url=jdbc:h2:file:./data/notenest
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# H2 Console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

server.port=8081
# Logging
logging.level.com.notenest.service.GeminiService=DEBUG

# Gemini AI — set GEMINI_API_KEY env var locally (or paste your key as the default)
gemini.api.key=${GEMINI_API_KEY:}
gemini.api.url=https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent