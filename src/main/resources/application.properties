# ═══════════════════════════════════════════════════════════════════════════
#  NoteNest — Development profile (H2 + dev defaults)
# ═══════════════════════════════════════════════════════════════════════════
#  Quick reference for every configurable property in this file.
#  For production (Postgres on Render), see application-prod.properties.
# ───────────────────────────────────────────────────────────────────────────
#
#  ── Application ────────────────────────────────────────────────────────────
#  spring.application.name      Display name used in logs / actuator output.
#  spring.profiles.active       'dev' loads this file; 'prod' loads -prod.
#
#  ── Database (dev = H2 file) ──────────────────────────────────────────────
#  spring.datasource.url        H2 stores the DB at ./data/notenest.mv.db
#                               so notes survive app restarts.
#  spring.datasource.username   Default 'sa' for H2 — no password.
#
#  ── H2 Console ────────────────────────────────────────────────────────────
#  spring.h2.console.enabled    Set to false in prod; useful in dev for
#                               browsing the DB at http://localhost:8081/h2-console.
#
#  ── JPA / Hibernate ───────────────────────────────────────────────────────
#  ddl-auto=update              Creates/migrates schema on startup.
#                               Use 'validate' once your schema is stable.
#  show-sql, format_sql         Verbose SQL logging for dev — disable in prod.
#
#  ── Server ────────────────────────────────────────────────────────────────
#  server.port                  Local dev port. Change if 8081 is taken.
#
#  ── Logging ───────────────────────────────────────────────────────────────
#  logging.level.<package>      Set per-package log level. DEBUG for Gemini
#                               surfaces full request/response details when
#                               debugging API issues.
#
#  ── Gemini AI ─────────────────────────────────────────────────────────────
#  gemini.api.key               Your Google AI Studio API key. Default value
#                               below pulls from the GEMINI_API_KEY env var —
#                               either set that env var, or replace ${...} with
#                               your literal key string for local-only dev.
#                               GET A FREE KEY: https://aistudio.google.com/app/apikey
#  gemini.api.url               Gemini endpoint. gemini-1.5-flash is free-tier
#                               friendly; swap to gemini-1.5-pro if you upgrade.
#
#  AI features powered by this key:
#    • Q&A from notes (/ai/chat)
#    • Note summarizer        • Title suggester
#    • Grammar fixer          • Meeting formatter
#    • Flashcard generator    • Voice-note cleanup
#
#  Rate limit: 12 calls/hour (in-memory, per JVM). Configurable in
#  RateLimitService.java if you need a different cap.
# ═══════════════════════════════════════════════════════════════════════════

# Application
spring.application.name=NoteNest
spring.profiles.active=dev

# H2 File-Based Database (persists across restarts)
spring.datasource.url=jdbc:h2:file:./data/notenest
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# H2 Console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

server.port=8081
# Logging
logging.level.com.notenest.service.GeminiService=DEBUG

# Gemini AI — set GEMINI_API_KEY env var locally (or paste your key as the default)
gemini.api.key=${GEMINI_API_KEY:}
gemini.api.url=https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent
